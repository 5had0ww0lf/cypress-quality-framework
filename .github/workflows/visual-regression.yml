name: Visual Regression Tests

on:
  push:
    branches: [ visual-regression ]
  pull_request:
    branches: [ visual-regression ]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run ESLint
      run: npm run lint
      continue-on-error: true
    
    - name: Run visual regression tests
      run: npm run visual:run
    
    - name: Upload visual regression reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-reports-${{ matrix.node-version }}
        path: |
          cypress-image-diff/cypress-visual-report/
          cypress/screenshots/
        retention-days: 30
    
    - name: Upload baseline snapshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: baseline-snapshots-${{ matrix.node-version }}
        path: cypress-image-diff/cypress-visual-screenshots/baseline/
        retention-days: 30
    
    - name: Comment PR with results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = 'cypress-image-diff/cypress-visual-report/cypress-visual-report.html';
          const message = `Visual regression tests completed. [View detailed report](${reportPath})`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
